<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Classic Brick Game | Ultimate Web Edition</title>
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiQnJpY2sgR2FtZSIsInNob3J0X25hbWUiOiJCQyIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiNlMGUwZTAiLCJ0aGVtZV9jb2xvciI6IiNkY2RjZGMifQ==">
    <style>
        :root {
            --console-bg: #dcdcdc; --console-border: #b0b0b0; --bezel-bg: #222;
            --lcd-bg: #7ea172; --btn-system: #e5cc2c; --btn-action: #d83535; --btn-dpad: #333;
            --font-family: 'Courier New', Courier, monospace;
            --border-radius-console: 4vmin 4vmin 10vmin 10vmin; --border-radius-screen: 2vmin;
            --gloss-intensity: 0.5;
            --fx-shadow: 0 20px 50px rgba(0,0,0,0.5), inset -5px -5px calc(15px * var(--gloss-intensity)) rgba(255,255,255,0.8), inset 5px 5px calc(15px * var(--gloss-intensity)) rgba(0,0,0,0.2);
        }
        * { box-sizing: border-box; user-select: none; touch-action: manipulation; font-family: var(--font-family); }
        body { background: #e0e0e0; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100dvh; width: 100vw; overflow: hidden; }
        .power-save-mode #console { box-shadow: none !important; }
        #console { background: var(--console-bg); border-radius: var(--border-radius-console); padding: 4vmin 3vmin; box-shadow: var(--fx-shadow); display: flex; flex-direction: column; gap: 4vmin; width: 96vw; max-width: 450px; height: 96dvh; max-height: 850px; border: 2px solid var(--console-border); position: relative; transition: background 0.2s, box-shadow 0.2s; }
        #screen-bezel { background: var(--bezel-bg); border-radius: var(--border-radius-screen); padding: 3vmin; box-shadow: inset 0 5px 15px rgba(0,0,0,0.8), 0 2px 5px rgba(255,255,255,0.5); border-bottom: 4px solid #111; position: relative; }
        #lcd-screen { background: var(--lcd-bg); border-radius: 1vmin; padding: 1.5vmin; display: flex; flex-direction: row; gap: 2vmin; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); position: relative; overflow: hidden; align-items: stretch; transition: background 1s linear; }
        #game-grid { flex: 1 1 auto; max-width: 65%; display: flex; justify-content: center; align-items: center; transition: aspect-ratio 0.4s ease; position: relative; min-height: auto; }
        #game-grid canvas { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; display: block; }
        #replay-badge { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.5); color: #fff; padding: 2px 5px; font-size: 1.5vmin; border-radius: 3px; display: none; }
        #side-panel { width: 35%; display: flex; flex-direction: column; align-items: flex-end; gap: 1vmin; flex-shrink: 0; }
        .lcd-text { color: #2a3a24; font-size: 2.5vmin; font-weight: bold; text-align: right; margin-bottom: -1vmin; text-shadow: 1px 1px 0px rgba(126, 161, 114, 0.5); }
        .lcd-num { color: #111; font-size: 4vmin; font-weight: bold; font-family: monospace; letter-spacing: 2px; transition: opacity 0.1s; }
        #status-icons { display: flex; gap: 1vmin; font-size: 2.5vmin; margin-bottom: 1vmin; color: #111; align-items: center; flex-wrap: wrap; justify-content: flex-end; width: 100%;}
        #ind-hd { font-size: 2vmin; opacity: 0; transition: opacity 0.2s; color: #ffaa00; text-shadow: 0 0 2px #000; }
        #mini-grid { width: 100%; aspect-ratio: 1 / 1; margin: 1vmin 0; }
        #mini-grid canvas { width: 100%; height: 100%; image-rendering: pixelated; display: block; }
        #controls-area { display: flex; flex-direction: column; gap: 4vmin; flex: 1; }
        .sys-btns { display: flex; justify-content: space-around; padding: 0 4vmin; }
        .small-btn-group { display: flex; flex-direction: column; align-items: center; gap: 1vmin; }
        .small-btn-label { font-size: 2vmin; color: #555; font-weight: bold; }
        .small-btn { background: var(--btn-system); width: 6vmin; height: 6vmin; max-width: 40px; max-height: 40px; border-radius: 50%; border: none; box-shadow: 2px 2px 5px rgba(0,0,0,0.4), inset -1px -1px 3px rgba(0,0,0,0.2); cursor: pointer; transition: 0.05s linear; }
        .small-btn:active { transform: scale(0.9); background: #c4b020; }
        .game-pads { display: flex; justify-content: space-between; align-items: flex-end; padding: 0 2vmin; flex: 1; }
        .d-pad { position: relative; width: 32vmin; height: 32vmin; max-width: 160px; max-height: 160px; }
        .d-btn { position: absolute; background: var(--btn-dpad); border: none; width: 33%; height: 33%; cursor: pointer; box-shadow: inset 1px 1px 2px rgba(255,255,255,0.2), 2px 2px 4px rgba(0,0,0,0.5); transition: 0.05s linear; }
        .d-btn:active { background: #222; transform: scale(0.95); }
        .d-up { top: 0; left: 33.5%; border-radius: 10px 10px 0 0; }
        .d-down { bottom: 0; left: 33.5%; border-radius: 0 0 10px 10px; }
        .d-left { top: 33.5%; left: 0; border-radius: 10px 0 0 10px; }
        .d-right { top: 33.5%; right: 0; border-radius: 0 10px 10px 0; }
        .d-center { position: absolute; top: 33.5%; left: 33.5%; width: 33%; height: 33%; background: #333; pointer-events: none; }
        .action-group { display: flex; flex-direction: column; align-items: center; gap: 2vmin; }
        .action-btn { background: var(--btn-action); width: 20vmin; height: 20vmin; max-width: 110px; max-height: 110px; border-radius: 50%; border: none; box-shadow: 3px 3px 8px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(0,0,0,0.3), inset 2px 2px 5px rgba(255,255,255,0.4); cursor: pointer; transition: 0.05s linear; }
        .action-btn:active { transform: scale(0.95); background: #b52c2c; }
        .action-label { font-size: 2.5vmin; color: #555; font-weight: bold; text-align: center;}
        
        #settings-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; color: #0f0; padding: 5%; backdrop-filter: blur(3px); border-radius: var(--border-radius-console); }
        .modal-content { background: #111; border: 2px solid #0f0; padding: 20px; border-radius: 10px; width: 100%; max-width: 320px; max-height: 90vh; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .modal-title { text-align: center; font-size: 20px; border-bottom: 1px solid #0f0; padding-bottom: 10px; margin: 0; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .setting-btn { background: transparent; border: 1px solid #0f0; color: #0f0; padding: 5px; cursor: pointer; border-radius: 5px; font-family: var(--font-family); transition: 0.05s linear; font-size:12px;}
        .setting-btn:active { background: #0f0; color: #111; transform: scale(0.95); }
        .color-input { width: 30px; height: 25px; border: 1px solid #0f0; background: #111; cursor: pointer; }
        textarea { width: 100%; height: 50px; background: #222; color: #0f0; border: 1px solid #0f0; resize: none; font-size: 10px; padding: 5px; font-family: var(--font-family); margin-top: 10px;}
        .close-btn { background: #0f0; color: #111; border: none; padding: 10px; width: 100%; font-weight: bold; margin-top: 5px; border-radius: 5px; cursor: pointer; }
        .mod-item { display: flex; justify-content: space-between; align-items: center; background: #222; border: 1px dashed #0f0; padding: 5px 8px; border-radius: 4px; font-size: 12px; margin-top: 5px;}
        .btn-delete { background: #d83535; color: white; border: 1px solid #ff5555; border-radius: 3px; cursor: pointer; padding: 2px 8px; font-weight: bold; transition: 0.05s linear; }
    </style>
</head>
<body>
<div id="console">
    <div id="settings-modal">
        <div class="modal-content">
            <h3 class="modal-title">НАСТРОЙКИ</h3>
            <div class="setting-row"><span>ЗВУК (FX):</span><button class="setting-btn" id="btn-toggle-sound">ВКЛ</button></div>
            <div class="setting-row"><span>МУЗЫКА:</span><button class="setting-btn" id="btn-toggle-music">ВКЛ</button></div>
            <div class="setting-row"><span>ГОЛОС (TTS):</span><button class="setting-btn" id="btn-toggle-tts">ВКЛ</button></div>
            <div class="setting-row"><span>ДИСКО-ФОН:</span><button class="setting-btn" id="btn-toggle-disco">ВКЛ</button></div>
            <div class="setting-row"><span>ЦВЕТ:</span><input type="color" id="console-color-picker" value="#dcdcdc" class="color-input"></div>
            <div class="setting-row"><span>EYE TRACKING:</span><button class="setting-btn" id="btn-toggle-eye">ВЫКЛ</button></div>
            <div class="setting-row"><span>WEB XR (VR):</span><button class="setting-btn" id="btn-toggle-xr">ВЫКЛ</button></div>
            
            <div style="margin-top: 10px; border-top: 1px solid #0f0; padding-top: 10px;">МЕНЕДЖЕР МОДОВ:</div>
            <div id="mod-list"></div>
            <textarea id="mod-code" placeholder="Вставьте код JS..."></textarea>
            <button class="setting-btn" style="background: rgba(0, 255, 0, 0.2); width: 100%; margin-top: 5px;" id="btn-install-mod">УСТАНОВИТЬ МОД</button>
            
            <button class="close-btn" id="btn-close-settings">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="screen-bezel">
        <div id="lcd-screen">
            <div id="game-grid"><canvas id="mainCanvas"></canvas><div id="replay-badge">▶ REPLAY</div></div>
            <div id="side-panel">
                <div id="status-icons">
                    <span id="ind-hd">HD</span><span id="icon-bat">🔋</span><span id="icon-music">🎵</span><span id="icon-sound">🔊</span><span id="icon-tts">💬</span>
                </div>
                <div class="lcd-text">ОЧКИ</div><div id="lcd-score" class="lcd-num">000000</div>
                <div class="lcd-text">РЕКОРД</div><div id="lcd-hiscore" class="lcd-num">000000</div>
                <div id="mini-grid"><canvas id="miniCanvas"></canvas></div>
                <div class="lcd-text">СЛЕД.</div>
                <div class="lcd-text" id="lbl-speed">СКОРОСТЬ</div><div id="lcd-speed" class="lcd-num">1</div>
                <div class="lcd-text" id="lbl-level">УРОВЕНЬ</div><div id="lcd-level" class="lcd-num">1</div>
            </div>
        </div>
    </div>
    <div id="controls-area">
        <div class="sys-btns">
            <div class="small-btn-group"><button class="small-btn" id="btn-settings"></button><div class="small-btn-label">SET</div></div>
            <div class="small-btn-group"><button class="small-btn" id="btn-hd"></button><div class="small-btn-label">HD</div></div>
            <div class="small-btn-group"><button class="small-btn" id="btn-start"></button><div class="small-btn-label">S/P</div></div>
            <div class="small-btn-group"><button class="small-btn" id="btn-reset"></button><div class="small-btn-label">RESET</div></div>
        </div>
        <div class="game-pads">
            <div class="d-pad">
                <div class="d-btn d-up" id="btn-up"></div><div class="d-btn d-left" id="btn-left"></div>
                <div class="d-center"></div><div class="d-btn d-right" id="btn-right"></div><div class="d-btn d-down" id="btn-down"></div>
            </div>
            <div class="action-group">
                <button class="action-btn" id="btn-action"></button><div class="action-label">ДЕЙСТВИЕ</div>
            </div>
        </div>
    </div>
</div>

<script src="core.js"></script>
<script src="games/tetris.js"></script>
<script src="games/snake.js"></script>
<script src="games/vessels.js"></script>
<script src="games/2048.js"></script>
<script src="mod_manager.js"></script> <!-- исправлено название -->
<script src="main.js"></script>

</body>
</html>
