<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a84ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Змейка</title>
<style>
:root {
    --bg: #ffffff; --fg: #000000; --accent: #007aff; --grid: rgba(0,0,0,0.05);
    --btn-bg: #f0f0f0; --btn-fg: #000; --danger: #ff3b30;
}
[data-theme="dark"] {
    --bg: #1c1c1e; --fg: #ffffff; --accent: #0a84ff; --grid: rgba(255,255,255,0.05);
    --btn-bg: #2c2c2e; --btn-fg: #fff;
}
[data-theme="gameboy"] {
    --bg: #9bbc0f; --fg: #0f380f; --accent: #306230; --grid: rgba(15,56,15,0.1);
    --btn-bg: #8bac0f; --btn-fg: #0f380f;
}
[data-theme="brick"] {
    --bg: #8b956d; --fg: #2c301e; --accent: #2c301e; --grid: rgba(44,48,30,0.15);
    --btn-bg: #7a845d; --btn-fg: #2c301e;
}
* { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--fg); height: 100vh; width: 100vw; overflow: hidden; display: flex; flex-direction: column; }
.screen { display: none; flex: 1; flex-direction: column; padding: 20px; overflow-y: auto; }
.screen.active { display: flex; }
h1 { text-align: center; margin-bottom: 20px; font-size: 28px; }
h2 { margin: 15px 0 10px; font-size: 20px; border-bottom: 2px solid var(--accent); padding-bottom: 5px;}
.btn { background: var(--btn-bg); color: var(--btn-fg); border: 2px solid var(--fg); padding: 15px; margin: 8px 0; border-radius: 12px; font-size: 18px; font-weight: bold; text-align: center; cursor: pointer; transition: transform 0.1s; }
.btn:active { transform: scale(0.95); background: var(--accent); color: var(--bg); }
.btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
.btn.danger { border-color: var(--danger); color: var(--danger); }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
#gameArea { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
canvas { border: 3px solid var(--fg); background: var(--bg); image-rendering: pixelated; max-width: 100%; max-height: 60vh; }
.hud { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 10px 0; font-size: 18px; font-weight: bold; }
#pauseBtn { background: none; border: 2px solid var(--fg); color: var(--fg); font-size: 24px; padding: 0 12px; border-radius: 8px; cursor: pointer; line-height: 1.8; }
#gameHint { text-align: center; padding: 5px 0; font-size: 14px; opacity: 0.8; min-height: 24px; color: var(--fg); }
#bonusHint { text-align: center; padding: 4px 0; font-size: 16px; font-weight: bold; color: var(--accent); min-height: 28px; transition: all 0.3s; }
#extraHud { display: flex; justify-content: space-around; width: 100%; padding: 5px 0; font-size: 14px; opacity: 0.7; }
#controls { width: 100%; height: 35vh; display: flex; align-items: center; justify-content: center; position: relative; }
.dpad { position: relative; width: 180px; height: 180px; display: none; }
.dpad-btn { position: absolute; width: 60px; height: 60px; background: var(--btn-bg); border: 2px solid var(--fg); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
.dpad-btn:active { background: var(--accent); }
.dpad-up { top: 0; left: 60px; }
.dpad-down { bottom: 0; left: 60px; }
.dpad-left { top: 60px; left: 0; }
.dpad-right { top: 60px; right: 0; }
.joystick { width: 150px; height: 150px; background: var(--grid); border: 2px solid var(--fg); border-radius: 50%; display: none; position: relative; }
.joystick-knob { width: 60px; height: 60px; background: var(--accent); border-radius: 50%; position: absolute; top: 45px; left: 45px; pointer-events: none; }
.back-btn { position: absolute; top: 10px; left: 10px; background: none; border: none; color: var(--fg); font-size: 24px; z-index: 10; cursor: pointer; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-content { background: var(--bg); color: var(--fg); padding: 30px; border-radius: 15px; text-align: center; border: 2px solid var(--fg); width: 80%; max-width: 300px; }
.cons-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
#pauseOverlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; font-size: 48px; color: #fff; z-index: 50; pointer-events: none; }
#pauseOverlay.active { display: flex; }
</style>
</head>
<body data-theme="dark">

<!-- MENU -->
<div id="menuScreen" class="screen active">
    <h1>ЗМЕЙКА</h1>
    <button class="btn" onclick="showScreen('modeScreen')">ИГРАТЬ</button>
    <button class="btn" onclick="showScreen('settingsScreen')">НАСТРОЙКИ</button>
    <button class="btn danger" onclick="if(confirm('Выйти?')) window.close()">ВЫХОД</button>
</div>

<!-- SETTINGS -->
<div id="settingsScreen" class="screen">
    <button class="back-btn" onclick="showScreen('menuScreen')">←</button>
    <h1>НАСТРОЙКИ</h1>
    <h2>Звук и Музыка</h2>
    <div class="grid-2">
        <button class="btn" id="btnSound" onclick="toggleSetting('sound')">Звук: ВКЛ</button>
        <button class="btn" id="btnMusic" onclick="toggleSetting('music')">Музыка: ВЫКЛ</button>
    </div>
    <h2>Тема</h2>
    <div class="grid-2">
        <button class="btn" onclick="setTheme('light')">Светлая</button>
        <button class="btn" onclick="setTheme('dark')">Тёмная</button>
        <button class="btn" onclick="setTheme('gameboy')">Gameboy</button>
        <button class="btn" onclick="setTheme('brick')">Brick Game</button>
    </div>
    <h2>Размер поля</h2>
    <div class="grid-3">
        <button class="btn" onclick="setSize('small')">Малый</button>
        <button class="btn" onclick="setSize('medium')">Средний</button>
        <button class="btn" onclick="setSize('large')">Большой</button>
    </div>
    <h2>Управление</h2>
    <div class="grid-2">
        <button class="btn" onclick="setControl('swipe')">Свайп</button>
        <button class="btn" onclick="setControl('dpad')">Крестовина</button>
        <button class="btn" onclick="setControl('joystick')">Джойстик</button>
        <button class="btn" onclick="setControl('keyboard')">Клавиатура</button>
    </div>
    <button class="btn" onclick="startCustomBind()">Настроить кнопки</button>
</div>

<!-- MODE SELECT -->
<div id="modeScreen" class="screen">
    <button class="back-btn" onclick="showScreen('menuScreen')">←</button>
    <h1>РЕЖИМЫ</h1>
    <div class="grid-2">
        <button class="btn" onclick="startGame('classic')">Классический</button>
        <button class="btn" onclick="startGame('time')">На время</button>
        <button class="btn" onclick="startGame('bonuses')">Бонусы</button>
        <button class="btn" onclick="startGame('queue')">Очередь</button>
        <button class="btn" onclick="startGame('unbound')">Безграничный</button>
        <button class="btn" onclick="startGame('zen')">Дзен</button>
        <button class="btn" onclick="startGame('ascii')">ASCII</button>
        <button class="btn" onclick="startGame('smile')">Смайл</button>
    </div>
    <button class="btn" onclick="showScreen('constructorScreen')">Конструктор</button>
</div>

<!-- CONSTRUCTOR -->
<div id="constructorScreen" class="screen">
    <button class="back-btn" onclick="showScreen('modeScreen')">←</button>
    <h1>КОНСТРУКТОР</h1>
    <p style="text-align:center; margin-bottom:15px;">Выбери 2-3 модификатора:</p>
    <div class="grid-2">
        <button class="btn cons-btn" data-mod="queue" onclick="toggleCons(this)">Очередь</button>
        <button class="btn cons-btn" data-mod="bonuses" onclick="toggleCons(this)">Бонусы</button>
        <button class="btn cons-btn" data-mod="time" onclick="toggleCons(this)">На время</button>
        <button class="btn cons-btn" data-mod="unbound" onclick="toggleCons(this)">Безграничный</button>
        <button class="btn cons-btn" data-mod="zen" onclick="toggleCons(this)">Дзен</button>
    </div>
    <button class="btn" style="margin-top:20px;" onclick="startConstructor()">ЗАПУСТИТЬ</button>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
    <div class="hud">
        <span id="scoreDisplay">Очки: <span id="score">0</span></span>
        <span id="timerHud" style="display:none;">Время: <span id="timer">60</span></span>
        <span id="highscoreDisplay">Рекорд: <span id="highscore">0</span></span>
        <button id="pauseBtn" onclick="togglePause()">⏸</button>
    </div>
    <div id="gameHint"></div>
    <div id="bonusHint"></div>
    <div id="gameArea">
        <canvas id="canvas"></canvas>
        <div id="pauseOverlay">⏸ ПАУЗА</div>
    </div>
    <div id="extraHud">
        <span>Длина: <span id="length">3</span></span>
        <span>Скорость: <span id="speedDisplay">300</span> мс</span>
        <span id="comboDisplay" style="display:none;">Комбо: x<span id="combo">1</span></span>
    </div>
    <div id="controls">
        <div class="dpad" id="dpad">
            <div class="dpad-btn dpad-up" data-dir="up">▲</div>
            <div class="dpad-btn dpad-down" data-dir="down">▼</div>
            <div class="dpad-btn dpad-left" data-dir="left">◀</div>
            <div class="dpad-btn dpad-right" data-dir="right">▶</div>
        </div>
        <div class="joystick" id="joystick">
            <div class="joystick-knob" id="knob"></div>
        </div>
    </div>
</div>

<!-- MODALS -->
<div class="modal" id="gameOverModal">
    <div class="modal-content">
        <h2 id="gameOverTitle">ИГРА ОКОНЧЕНА</h2>
        <p style="margin: 15px 0;">Очки: <span id="finalScore">0</span></p>
        <button class="btn" onclick="restartGame()">Заново</button>
        <button class="btn" onclick="showScreen('menuScreen'); hideModal('gameOverModal')">В Меню</button>
    </div>
</div>

<div class="modal" id="pauseModal">
    <div class="modal-content">
        <h2>⏸ ПАУЗА</h2>
        <div id="pauseHighscores" style="margin:10px 0; font-size:14px;"></div>
        <button class="btn" onclick="togglePause()">Продолжить</button>
        <button class="btn" onclick="restartGame(); hideModal('pauseModal')">Заново</button>
        <button class="btn" onclick="showScreen('menuScreen'); hideModal('pauseModal')">Выйти</button>
    </div>
</div>

<div class="modal" id="bindModal">
    <div class="modal-content">
        <h2>Настройка</h2>
        <p id="bindPrompt">Нажмите любую кнопку...</p>
        <button class="btn" style="margin-top:15px;" onclick="cancelBind()">Отмена</button>
    </div>
</div>

<script>
// ================= PWA MANIFEST (встроенный) =================
(function() {
    const manifest = {
        name: "Змейка",
        short_name: "Змейка",
        start_url: "snake.html",
        display: "standalone",
        background_color: "#1c1c1e",
        theme_color: "#0a84ff",
        icons: [
            {
                src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Ctext y='140' font-size='140' text-anchor='middle'%3E🐍%3C/text%3E%3C/svg%3E",
                sizes: "192x192",
                type: "image/svg+xml"
            },
            {
                src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Ctext y='370' font-size='370' text-anchor='middle'%3E🐍%3C/text%3E%3C/svg%3E",
                sizes: "512x512",
                type: "image/svg+xml"
            }
        ]
    };
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = 'data:application/json,' + encodeURIComponent(JSON.stringify(manifest));
    document.head.appendChild(link);
})();

// ================= STATE & CONFIG =================
const state = {
    sound: true, music: false, theme: 'dark', size: 'medium', control: 'swipe',
    customBinds: { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight' }
};
const sizes = { small: 20, medium: 15, large: 10 };
let gridCount = 15;

let styleCache = { bg: '#1c1c1e', fg: '#ffffff', accent: '#0a84ff', grid: 'rgba(255,255,255,0.05)' };
function updateStyleCache() {
    const body = document.body;
    styleCache.bg = getComputedStyle(body).getPropertyValue('--bg').trim();
    styleCache.fg = getComputedStyle(body).getPropertyValue('--fg').trim();
    styleCache.accent = getComputedStyle(body).getPropertyValue('--accent').trim();
    styleCache.grid = getComputedStyle(body).getPropertyValue('--grid').trim();
}

// ================= AUDIO =================
let audioCtx;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => {});
    }
}
function playSound(freq, type, duration, volume = 0.1) {
    if (!state.sound) return;
    initAudio();
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch (_) {}
}
function soundEat() { playSound(600, 'square', 0.05); }
function soundBonus() { playSound(900, 'sine', 0.15); }
function soundDeath() { playSound(150, 'sawtooth', 0.4, 0.15); }
function soundWin() { [523,659,784].forEach((f,i)=>setTimeout(()=>playSound(f,'sine',0.2),i*150)); }

let musicInterval = null;
function startMusic() {
    if (!state.music || musicInterval) return;
    initAudio();
    const notes = [130.81,146.83,164.81,174.61,196.00];
    let i=0;
    musicInterval = setInterval(() => {
        if (!state.music) { clearInterval(musicInterval); musicInterval=null; return; }
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type='triangle';
            osc.frequency.value=notes[i%notes.length];
            gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime+0.3);
            i++;
        } catch(_){}
    },400);
}
function stopMusic() { if(musicInterval){ clearInterval(musicInterval); musicInterval=null; } }

// ================= UI & SETTINGS =================
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id==='gameScreen') setupControlsUI();
    if(id==='settingsScreen') updateStyleCache();
}
function hideModal(id) { document.getElementById(id).classList.remove('active'); }
function showModal(id) { document.getElementById(id).classList.add('active'); }

function toggleSetting(key) {
    state[key]=!state[key];
    document.getElementById(`btn${key.charAt(0).toUpperCase()+key.slice(1)}`).innerText =
        `${key==='sound'?'Звук':'Музыка'}: ${state[key]?'ВКЛ':'ВЫКЛ'}`;
    if(key==='music') state.music?startMusic():stopMusic();
    saveState();
}
function setTheme(t) { 
    state.theme=t; 
    document.body.dataset.theme=t; 
    updateStyleCache(); 
    saveState(); 
}
function setSize(s) { state.size=s; gridCount=sizes[s]; saveState(); }
function setControl(c) { state.control=c; saveState(); setupControlsUI(); }
function saveState() { localStorage.setItem('snakeState', JSON.stringify(state)); }
function loadState() {
    const s=localStorage.getItem('snakeState');
    if(s) Object.assign(state, JSON.parse(s));
    setTheme(state.theme);
    document.getElementById('btnSound').innerText=`Звук: ${state.sound?'ВКЛ':'ВЫКЛ'}`;
    document.getElementById('btnMusic').innerText=`Музыка: ${state.music?'ВКЛ':'ВЫКЛ'}`;
    if(state.music) startMusic();
    updateStyleCache();
}

// Custom Bind
let bindTarget=null, bindListenersAdded=false;
function startCustomBind() {
    bindTarget='up';
    document.getElementById('bindPrompt').innerText='Нажмите кнопку для ВВЕРХ...';
    showModal('bindModal');
    if(!bindListenersAdded) {
        document.addEventListener('keydown', handleBind);
        document.addEventListener('touchstart', handleBindTouch);
        bindListenersAdded=true;
    }
}
function handleBind(e){ e.preventDefault(); state.customBinds[bindTarget]=e.code; nextBind(); }
function handleBindTouch(e){ e.preventDefault(); state.customBinds[bindTarget]=`Touch_${e.target.id||'Screen'}`; nextBind(); }
function nextBind() {
    const dirs=['up','down','left','right'];
    const idx=dirs.indexOf(bindTarget);
    if(idx<3){ bindTarget=dirs[idx+1]; document.getElementById('bindPrompt').innerText=`Нажмите кнопку для ${bindTarget.toUpperCase()}...`; }
    else finishBind();
}
function finishBind() {
    hideModal('bindModal');
    if(bindListenersAdded){ document.removeEventListener('keydown',handleBind); document.removeEventListener('touchstart',handleBindTouch); bindListenersAdded=false; }
    saveState(); alert('Управление настроено!');
}
function cancelBind() {
    hideModal('bindModal');
    if(bindListenersAdded){ document.removeEventListener('keydown',handleBind); document.removeEventListener('touchstart',handleBindTouch); bindListenersAdded=false; }
}

// ================= HIGHSCORES =================
function getHighscores() {
    try { return JSON.parse(localStorage.getItem('snakeHighscores'))||{}; } catch { return {}; }
}
function saveHighscore(modeKey, score) {
    const scores=getHighscores();
    if(!scores[modeKey] || score>scores[modeKey]) {
        scores[modeKey]=score;
        localStorage.setItem('snakeHighscores', JSON.stringify(scores));
        return true;
    }
    return false;
}
function getModeKey(game) {
    if(game.mode==='constructor') {
        const mods=Object.keys(game.mods).filter(k=>game.mods[k]).sort();
        return 'constructor_'+mods.join('_');
    }
    return game.mode;
}

// ================= GAME ENGINE =================
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let game={};
let bonusTimeoutId=null, bonusTimeoutId2=null;
let paused=false;
let particles=[], explosionActive=false, explosionTimer=0;
let gameLoopId=null;

function togglePause() {
    if(!game || game.gameOver || explosionActive) return;
    paused=!paused;
    document.getElementById('pauseOverlay').classList.toggle('active', paused);
    document.getElementById('pauseBtn').innerText=paused?'▶':'⏸';
    if(paused) {
        if(game.timerInterval){ clearInterval(game.timerInterval); game.timerInterval=null; }
        const scores=getHighscores();
        const modeKey=getModeKey(game);
        const record=scores[modeKey]||0;
        if (game.mods.zen) {
            document.getElementById('pauseHighscores').innerHTML = '<i>Дзен-режим, очки не считаются</i>';
        } else {
            document.getElementById('pauseHighscores').innerHTML=`<b>Рекорд режима:</b> ${record}`;
        }
        showModal('pauseModal');
    } else {
        hideModal('pauseModal');
        if(game.mods.time && !game.gameOver && game.timerInterval===null) {
            game.timerInterval=setInterval(()=>{
                if(paused || game.gameOver) return;
                game.timeLeft--;
                document.getElementById('timer').innerText=game.timeLeft;
                if(game.timeLeft<=0) endGame(false,'ВРЕМЯ ВЫШЛО!');
            },1000);
        }
    }
}

function startGame(mode) {
    if (gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
    const mods={};
    if(mode==='classic') mods.classic=true;
    else if(mode==='time') mods.time=true;
    else if(mode==='bonuses') mods.bonuses=true;
    else if(mode==='queue') mods.queue=true;
    else if(mode==='unbound') mods.unbound=true;
    else if(mode==='zen') mods.zen=true;
    else if(mode==='ascii') mods.ascii=true;
    else if(mode==='smile') mods.smile=true;
    if(mods.zen) mods.unbound = true;
    initGame(mode, mods);
}
function startConstructor() {
    if (gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
    const mods={};
    document.querySelectorAll('.cons-btn.active').forEach(b=>mods[b.dataset.mod]=true);
    if(Object.keys(mods).length<2){ alert('Выберите минимум 2 модификатора!'); return; }
    if(mods.zen) mods.unbound = true;
    initGame('constructor', mods);
}
function toggleCons(btn){ btn.classList.toggle('active'); }

function initGame(mode, mods) {
    if(bonusTimeoutId){ clearTimeout(bonusTimeoutId); bonusTimeoutId=null; }
    if(bonusTimeoutId2){ clearTimeout(bonusTimeoutId2); bonusTimeoutId2=null; }
    if(game && game.timerInterval){ clearInterval(game.timerInterval); game.timerInterval=null; }
    particles=[]; explosionActive=false; paused=false;
    document.getElementById('pauseOverlay').classList.remove('active');
    document.getElementById('pauseBtn').innerText='⏸';
    hideModal('pauseModal');
    showScreen('gameScreen');

    const cellSize=Math.floor(Math.min(window.innerWidth*0.9, window.innerHeight*0.5)/gridCount);
    canvas.width=cellSize*gridCount;
    canvas.height=cellSize*gridCount;

    const startX=Math.floor(gridCount/2);
    const startY=Math.floor(gridCount/2);
    game={
        mode, mods, cellSize,
        snake:[{x:startX,y:startY},{x:startX-1,y:startY},{x:startX-2,y:startY}],
        dir:{x:1,y:0}, nextDir:{x:1,y:0},
        score:0, speed:300, baseSpeed:300,
        foods:[], queueIndex:0,
        comboTimer:0, comboMultiplier:1,
        timeLeft:60, timerInterval:null,
        blinkState:true, blinkTimer:0,
        gameOver:false,
        highscore:0,
        bonus:null, foodEaten:0,
        isWin:false,
        unbound:mods.unbound||false,
        zen:mods.zen||false,
        ascii:mods.ascii||false,
        smile:mods.smile||false,
        reverseActive:false, reverseTimer:0,
        shieldActive:false,
        invisibleActive:false, invisibleTimer:0,
        magnetActive:false, magnetTimer:0,
        slowActive:false, slowTimer:0,
        bonusTimeout: null
    };

    if (game.mods.zen) {
        document.getElementById('scoreDisplay').style.display = 'none';
        document.getElementById('highscoreDisplay').style.display = 'none';
    } else {
        document.getElementById('scoreDisplay').style.display = 'inline';
        document.getElementById('highscoreDisplay').style.display = 'inline';
        const modeKey=getModeKey(game);
        const scores=getHighscores();
        game.highscore=scores[modeKey]||0;
        document.getElementById('highscore').innerText=game.highscore;
    }

    document.getElementById('score').innerText='0';
    document.getElementById('bonusHint').innerText='';

    const hintEl=document.getElementById('gameHint');
    let hintText='';
    if(mods.queue) hintText='Очередь: ешь по порядку, бесконечно.';
    else if(mods.unbound && !mods.zen) hintText='Безграничный: можно выходить за рамки!';
    else if(mods.zen) hintText='Дзен: бесконечная игра без очков. Наслаждайся!';
    else if(mods.ascii) hintText='ASCII-графика: всё в символах.';
    else if(mods.smile) hintText='Смайл-графика: всё в эмодзи.';
    else if(mods.time) hintText='Змейка не растёт. Ешь быстрее для комбо!';
    else if(mods.bonuses) hintText='Собирай бонусы!';
    else hintText='Классика: ешь и расти!';
    hintEl.innerText=hintText;

    if(mods.time) {
        document.getElementById('timerHud').style.display='inline';
        game.timerInterval=setInterval(()=>{
            if(paused || game.gameOver) return;
            game.timeLeft--;
            document.getElementById('timer').innerText=game.timeLeft;
            if(game.timeLeft<=0) endGame(false,'ВРЕМЯ ВЫШЛО!');
        },1000);
    } else {
        document.getElementById('timerHud').style.display='none';
    }

    if(mods.queue) {
        generateQueueFoods();
    } else {
        spawnFood();
    }

    if(mods.bonuses) {
        bonusTimeoutId=setTimeout(spawnBonus, 3000);
    }

    document.getElementById('comboDisplay').style.display=mods.time?'inline':'none';

    updateStyleCache();
    lastTime=0;
    if(gameLoopId) cancelAnimationFrame(gameLoopId);
    gameLoopId=requestAnimationFrame(loop);
}

// ================= QUEUE =================
function generateQueueFoods() {
    const count=10;
    game.foods=[];
    for(let i=0;i<count;i++) {
        let x,y,attempts=0;
        do {
            x=Math.floor(Math.random()*gridCount);
            y=Math.floor(Math.random()*gridCount);
            attempts++;
            if(attempts>100) break;
        } while(isOccupied(x,y));
        if(attempts<=100) game.foods.push({x,y});
    }
    game.queueIndex=0;
}
function regenerateQueueFoods() {
    if (!game.foods) game.foods = [];
    game.foods = [];
    const count=10;
    for(let i=0;i<count;i++) {
        let x,y,attempts=0;
        do {
            x=Math.floor(Math.random()*gridCount);
            y=Math.floor(Math.random()*gridCount);
            attempts++;
            if(attempts>100) break;
        } while(isOccupied(x,y));
        if(attempts<=100) game.foods.push({x,y});
    }
    game.queueIndex=0;
}

// ================= SPAWN =================
function spawnFood() {
    let x,y,attempts=0;
    do {
        x=Math.floor(Math.random()*gridCount);
        y=Math.floor(Math.random()*gridCount);
        attempts++;
        if(attempts>100) break;
    } while(isOccupied(x,y));
    if(attempts<=100) game.food={x,y};
}

function spawnBonus() {
    if(!game.mods?.bonuses || game.gameOver) return;
    let x,y,attempts=0;
    do {
        x=Math.floor(Math.random()*gridCount);
        y=Math.floor(Math.random()*gridCount);
        attempts++;
        if(attempts>100) break;
    } while(isOccupied(x,y));
    if(attempts<=100) {
        const types=['grow2','shrink','slow','fast','reverse','shield','invisible','magnet','slowtime'];
        const type=types[Math.floor(Math.random()*types.length)];
        game.bonus={x,y,type};
        const icons={grow2:'+2 сегмента',shrink:'Уменьшение',slow:'Замедление',fast:'Ускорение',reverse:'Реверс',shield:'Щит',invisible:'Невидимость',magnet:'Магнит',slowtime:'Замедление времени'};
        document.getElementById('bonusHint').innerText='⭐ '+icons[type];
        setTimeout(()=>{ if(!game.gameOver) document.getElementById('bonusHint').innerText=''; },2000);
    }
    bonusTimeoutId2=setTimeout(spawnBonus,5000);
}

function applyBonus(type) {
    switch(type) {
        case 'grow2': { 
            const last=game.snake[game.snake.length-1]; 
            game.snake.push({...last},{...last}); 
            break; 
        }
        case 'shrink': 
            if (game.snake.length > 3) {
                game.snake = game.snake.slice(0, 3);
            }
            break;
        case 'slow': 
            if (game.bonusTimeout) clearTimeout(game.bonusTimeout);
            game.speed = Math.min(500, game.speed + 100);
            game.bonusTimeout = setTimeout(() => { 
                if (!game.gameOver) game.speed = game.baseSpeed; 
                game.bonusTimeout = null;
            }, 5000); 
            break;
        case 'fast': 
            if (game.bonusTimeout) clearTimeout(game.bonusTimeout);
            game.speed = Math.max(50, game.speed - 100);
            game.bonusTimeout = setTimeout(() => { 
                if (!game.gameOver) game.speed = game.baseSpeed; 
                game.bonusTimeout = null;
            }, 5000); 
            break;
        case 'reverse': game.reverseActive=true; game.reverseTimer=5000; break;
        case 'shield': game.shieldActive=true; break;
        case 'invisible': game.invisibleActive=true; game.invisibleTimer=5000; break;
        case 'magnet': game.magnetActive=true; game.magnetTimer=5000; break;
        case 'slowtime': 
            game.slowActive=true; 
            game.slowTimer=3000; 
            game.speed = game.baseSpeed * 2;
            break;
    }
}
function updateBonuses(delta) {
    if(game.reverseActive){ game.reverseTimer-=delta; if(game.reverseTimer<=0) game.reverseActive=false; }
    if(game.invisibleActive){ game.invisibleTimer-=delta; if(game.invisibleTimer<=0) game.invisibleActive=false; }
    if(game.magnetActive){ 
        game.magnetTimer-=delta; 
        if(game.magnetTimer<=0) game.magnetActive=false;
        if(game.food && game.snake.length>0) {
            const head=game.snake[0];
            const dx = head.x - game.food.x;
            const dy = head.y - game.food.y;
            if(Math.abs(dx)>1 || Math.abs(dy)>1) {
                let newX=game.food.x, newY=game.food.y;
                if(Math.abs(dx)>=Math.abs(dy)) {
                    newX += Math.sign(dx);
                } else {
                    newY += Math.sign(dy);
                }
                if(!isOccupied(newX, newY)) {
                    game.food.x=newX;
                    game.food.y=newY;
                }
            }
        }
    }
    if(game.slowActive){ 
        game.slowTimer-=delta; 
        if(game.slowTimer<=0){ 
            game.slowActive=false; 
            game.speed=game.baseSpeed; 
        }
    }
}

// ================= OCCUPIED =================
function isOccupied(x,y) {
    if(game.snake.some(s=>s.x===x && s.y===y)) return true;
    if(game.food && game.food.x===x && game.food.y===y) return true;
    if(game.foods && game.foods.some(f=>f.x===x && f.y===y)) return true;
    if(game.bonus && game.bonus.x===x && game.bonus.y===y) return true;
    return false;
}
function isBlocked(x, y) {
    if(!game.mods.unbound) {
        if(x<0 || x>=gridCount || y<0 || y>=gridCount) return true;
    }
    if(game.snake.some(s=>s.x===x && s.y===y)) return true;
    return false;
}

// ================= MAIN LOOP =================
let lastTime=0;
function loop(timestamp) {
    if(game.gameOver) {
        if(explosionActive){ updateExplosion(); draw(); }
        gameLoopId=requestAnimationFrame(loop);
        return;
    }
    if(paused) {
        gameLoopId=requestAnimationFrame(loop);
        return;
    }
    if(!lastTime) lastTime=timestamp;
    const delta=timestamp-lastTime;
    updateBonuses(delta);
    if(delta>game.speed) {
        updateGame();
        lastTime=timestamp;
    }
    game.blinkTimer+=delta;
    if(game.blinkTimer>200){ game.blinkState=!game.blinkState; game.blinkTimer=0; }
    draw();
    document.getElementById('length').innerText=game.snake.length;
    document.getElementById('speedDisplay').innerText=game.speed;
    if(game.mods.time) document.getElementById('combo').innerText=game.comboMultiplier||1;
    if(game.mods.queue && !game.gameOver) {
        const hintEl=document.getElementById('gameHint');
        const total=game.foods.length;
        const current=game.queueIndex+1;
        if(total>0) hintEl.innerText=`Цель: ${current} / ${total}  |  ${hintEl.innerText.split('|')[1]||''}`;
    }
    gameLoopId=requestAnimationFrame(loop);
}

// ================= UPDATE GAME =================
function updateGame() {
    let dx=game.nextDir.x, dy=game.nextDir.y;
    if(game.reverseActive){ dx=-dx; dy=-dy; }
    game.dir={x:dx,y:dy};
    const head={x:game.snake[0].x+dx, y:game.snake[0].y+dy};

    if(game.mods.unbound) {
        if(head.x<0) head.x=gridCount-1;
        if(head.x>=gridCount) head.x=0;
        if(head.y<0) head.y=gridCount-1;
        if(head.y>=gridCount) head.y=0;
    }

    let hit=false;
    if(!game.mods.unbound && !game.mods.zen) {
        if(head.x<0 || head.x>=gridCount || head.y<0 || head.y>=gridCount) hit=true;
    }
    if(!game.mods.zen) {
        if(game.snake.some(s=>s.x===head.x && s.y===head.y)) hit=true;
    }

    if(hit) {
        if(game.mods.zen) return;
        if(game.shieldActive) {
            game.shieldActive=false;
            playSound(400,'sine',0.1);
            return;
        }
        endGame(false);
        return;
    }

    game.snake.unshift({...head});

    let ate=false;
    let shouldGrow=true;
    let bonusAte=false;

    if(game.mods.queue) {
        if(game.queueIndex < game.foods.length && head.x===game.foods[game.queueIndex].x && head.y===game.foods[game.queueIndex].y) {
            ate=true;
            if (!game.mods.zen) game.score += 10;
            game.foods.splice(game.queueIndex, 1);
            if(game.foods.length === 0) {
                regenerateQueueFoods();
            }
        }
    } else if(game.mods.time) {
        if(game.food && head.x===game.food.x && head.y===game.food.y) {
            ate=true;
            shouldGrow=false;
            const now=Date.now();
            if(now-game.comboTimer<3000) game.comboMultiplier++;
            else game.comboMultiplier=1;
            game.comboTimer=now;
            if (!game.mods.zen) game.score += 10 * game.comboMultiplier;
            spawnFood();
        }
    } else {
        if(game.food && head.x===game.food.x && head.y===game.food.y) {
            ate=true;
            if (!game.mods.zen) game.score += 10;
            game.foodEaten++;
            if(game.foodEaten%10===0) {
                game.speed = Math.max(80, game.speed - 20);
                game.baseSpeed = game.speed;
            }
            spawnFood();
        }
    }

    if(game.mods.bonuses && game.bonus && head.x===game.bonus.x && head.y===game.bonus.y) {
        ate=true; bonusAte=true;
        if (!game.mods.zen) game.score += 20;
        const bonusType = game.bonus.type;
        applyBonus(bonusType);
        const icons = {grow2:'+2',shrink:'Уменьшение',slow:'Замедление',fast:'Ускорение',reverse:'Реверс',shield:'Щит',invisible:'Невидимость',magnet:'Магнит',slowtime:'Замедление'};
        game.bonus=null;
        soundBonus();
        document.getElementById('bonusHint').innerText='✅ ' + (icons[bonusType] || '');
        setTimeout(()=>{ if(!game.gameOver) document.getElementById('bonusHint').innerText=''; },2000);
    }

    if(!ate || !shouldGrow) {
        game.snake.pop();
    }

    if (!game.mods.zen) {
        document.getElementById('score').innerText=game.score;
    }
    if(ate && !bonusAte) soundEat();
}

// ================= EXPLOSION =================
function spawnExplosion() {
    particles=[];
    const segments=game.snake;
    for(let seg of segments) {
        const x=seg.x*game.cellSize+game.cellSize/2;
        const y=seg.y*game.cellSize+game.cellSize/2;
        const angle=Math.random()*2*Math.PI;
        const speed=2+Math.random()*4;
        particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:1.0,size:game.cellSize*0.4});
    }
    explosionActive=true;
    explosionTimer=0;
}
function updateExplosion() {
    for(let p of particles) {
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.life-=0.01; p.size*=0.99;
    }
    explosionTimer+=16;
    if(explosionTimer>1500) {
        explosionActive=false;
        if (!game.mods.zen) {
            document.getElementById('finalScore').innerText=game.score;
        } else {
            document.getElementById('finalScore').innerText = '∞';
        }
        document.getElementById('gameOverTitle').innerText=game.isWin?'ПОБЕДА! 🎉':'ИГРА ОКОНЧЕНА';
        showModal('gameOverModal');
    }
}

// ================= DRAW =================
function draw() {
    const {bg, fg, accent, grid}=styleCache;
    if(explosionActive) {
        ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);
        for(let p of particles) {
            ctx.globalAlpha=p.life;
            ctx.fillStyle='#ff3b30';
            ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
        }
        ctx.globalAlpha=1;
        return;
    }

    ctx.fillStyle=bg; ctx.fillRect(0,0,canvas.width,canvas.height);

    const isASCII=game.mods.ascii;
    const isSmile=game.mods.smile;

    if(!isASCII && !isSmile) {
        ctx.strokeStyle=grid;
        for(let i=0;i<=gridCount;i++) {
            ctx.beginPath(); ctx.moveTo(i*game.cellSize,0); ctx.lineTo(i*game.cellSize,canvas.height); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0,i*game.cellSize); ctx.lineTo(canvas.width,i*game.cellSize); ctx.stroke();
        }
    }

    if(!game.mods.queue && game.food) {
        if(isASCII) { ctx.fillStyle=fg; ctx.font=game.cellSize+'px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('*', game.food.x*game.cellSize+game.cellSize/2, game.food.y*game.cellSize+game.cellSize/2); }
        else if(isSmile) { ctx.fillStyle=fg; ctx.font=game.cellSize+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🍎', game.food.x*game.cellSize+game.cellSize/2, game.food.y*game.cellSize+game.cellSize/2); }
        else { ctx.fillStyle=game.blinkState?accent:fg; ctx.fillRect(game.food.x*game.cellSize+2, game.food.y*game.cellSize+2, game.cellSize-4, game.cellSize-4); }
    }

    if(game.mods.queue) {
        game.foods.forEach((f,i)=>{
            if(i<game.queueIndex) ctx.globalAlpha=0.2;
            else if(i===game.queueIndex) ctx.fillStyle=game.blinkState?accent:fg;
            else ctx.fillStyle=fg;
            if(isASCII) { ctx.globalAlpha=1; ctx.fillStyle=fg; ctx.font=game.cellSize+'px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('*', f.x*game.cellSize+game.cellSize/2, f.y*game.cellSize+game.cellSize/2); }
            else if(isSmile) { ctx.globalAlpha=1; ctx.fillStyle=fg; ctx.font=game.cellSize+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🍎', f.x*game.cellSize+game.cellSize/2, f.y*game.cellSize+game.cellSize/2); }
            else ctx.fillRect(f.x*game.cellSize+2, f.y*game.cellSize+2, game.cellSize-4, game.cellSize-4);
        });
        ctx.globalAlpha=1;
    }

    if(game.bonus) {
        if(isASCII) { ctx.fillStyle='#'; ctx.font=game.cellSize+'px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('B', game.bonus.x*game.cellSize+game.cellSize/2, game.bonus.y*game.cellSize+game.cellSize/2); }
        else if(isSmile) { ctx.fillStyle='#'; ctx.font=game.cellSize+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('⭐', game.bonus.x*game.cellSize+game.cellSize/2, game.bonus.y*game.cellSize+game.cellSize/2); }
        else {
            ctx.fillStyle='#ff3b30';
            ctx.beginPath();
            ctx.arc(game.bonus.x*game.cellSize+game.cellSize/2, game.bonus.y*game.cellSize+game.cellSize/2, game.cellSize/2-2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle='#fff';
            ctx.font=game.cellSize*0.5+'px Arial';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            const icons={grow2:'+2',shrink:'-',slow:'S',fast:'F',reverse:'R',shield:'🛡',invisible:'👻',magnet:'🧲',slowtime:'⏳'};
            ctx.fillText(icons[game.bonus.type]||'?', game.bonus.x*game.cellSize+game.cellSize/2, game.bonus.y*game.cellSize+game.cellSize/2);
        }
    }

    function drawSnake(snake, color, isHead) {
        if(!snake) return;
        snake.forEach((s,i)=>{
            if(isASCII) {
                ctx.fillStyle=fg;
                ctx.font=game.cellSize+'px monospace';
                ctx.textAlign='center'; ctx.textBaseline='middle';
                const char=(i===0)?'@':'o';
                ctx.fillText(char, s.x*game.cellSize+game.cellSize/2, s.y*game.cellSize+game.cellSize/2);
            } else if(isSmile) {
                ctx.fillStyle=fg;
                ctx.font=game.cellSize+'px serif';
                ctx.textAlign='center'; ctx.textBaseline='middle';
                const char=(i===0)?'😀':'🟩';
                ctx.fillText(char, s.x*game.cellSize+game.cellSize/2, s.y*game.cellSize+game.cellSize/2);
            } else {
                ctx.fillStyle=(i===0)?(game.blinkState?accent:color):color;
                ctx.fillRect(s.x*game.cellSize+1, s.y*game.cellSize+1, game.cellSize-2, game.cellSize-2);
            }
        });
    }

    if(!game.invisibleActive || isASCII || isSmile) {
        drawSnake(game.snake, fg, true);
    } else {
        const head=game.snake[0];
        ctx.globalAlpha=0.3;
        ctx.fillStyle=accent;
        ctx.fillRect(head.x*game.cellSize+1, head.y*game.cellSize+1, game.cellSize-2, game.cellSize-2);
        ctx.globalAlpha=1;
    }

    if(game.shieldActive && game.snake.length>0) {
        const head=game.snake[0];
        ctx.strokeStyle='#2ecc71';
        ctx.lineWidth=3;
        ctx.beginPath();
        ctx.arc(head.x*game.cellSize+game.cellSize/2, head.y*game.cellSize+game.cellSize/2, game.cellSize/2+2, 0, Math.PI*2);
        ctx.stroke();
    }
}

// ================= END GAME =================
function endGame(win=false, title=null) {
    if(game.gameOver) return;
    game.gameOver=true;
    game.isWin=win;
    if(game.timerInterval){ clearInterval(game.timerInterval); game.timerInterval=null; }
    if(bonusTimeoutId){ clearTimeout(bonusTimeoutId); bonusTimeoutId=null; }
    if(bonusTimeoutId2){ clearTimeout(bonusTimeoutId2); bonusTimeoutId2=null; }
    stopMusic();

    if (!game.mods.zen) {
        const modeKey=getModeKey(game);
        let finalScore=game.score;
        const isNewRecord=saveHighscore(modeKey, finalScore);
        if(isNewRecord) game.highscore=finalScore;
        document.getElementById('highscore').innerText=game.highscore;
        document.getElementById('finalScore').innerText=finalScore;
    } else {
        document.getElementById('finalScore').innerText = '∞';
    }

    if(win) soundWin();
    else {
        soundDeath();
        spawnExplosion();
    }
    if(win) {
        document.getElementById('gameOverTitle').innerText=title||'ПОБЕДА! 🎉';
        showModal('gameOverModal');
    }
}

function restartGame() {
    if (gameLoopId) { cancelAnimationFrame(gameLoopId); gameLoopId = null; }
    hideModal('gameOverModal');
    hideModal('pauseModal');
    if(game.mode==='constructor') startConstructor();
    else startGame(game.mode);
}

// ================= CONTROLS =================
function setupControlsUI() {
    const dpad=document.getElementById('dpad');
    const joy=document.getElementById('joystick');
    dpad.style.display=state.control==='dpad'?'block':'none';
    joy.style.display=state.control==='joystick'?'block':'none';
    document.querySelectorAll('.dpad-btn').forEach(btn=>{
        btn.ontouchstart=btn.onmousedown=(e)=>{ e.preventDefault(); changeDir(btn.dataset.dir); };
    });
    const knob=document.getElementById('knob');
    let joyActive=false;
    const newJoy=joy.cloneNode(true);
    joy.parentNode.replaceChild(newJoy, joy);
    const newKnob=document.getElementById('knob');
    newJoy.ontouchstart=newJoy.onmousedown=(e)=>{ joyActive=true; e.preventDefault(); };
    document.addEventListener('touchmove',(e)=>{ if(joyActive && document.getElementById('gameScreen').classList.contains('active')) moveJoy(e.touches[0], newJoy, newKnob); });
    document.addEventListener('mousemove',(e)=>{ if(joyActive && document.getElementById('gameScreen').classList.contains('active')) moveJoy(e, newJoy, newKnob); });
    document.addEventListener('touchend',()=>{ joyActive=false; newKnob.style.transform='translate(0,0)'; });
    document.addEventListener('mouseup',()=>{ joyActive=false; newKnob.style.transform='translate(0,0)'; });
}
function moveJoy(e, joyEl, knobEl) {
    const rect=joyEl.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    const x=e.clientX-cx, y=e.clientY-cy;
    const dist=Math.min(45, Math.sqrt(x*x+y*y));
    const angle=Math.atan2(y,x);
    knobEl.style.transform=`translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
    if(Math.abs(x)>Math.abs(y)) changeDir(x>0?'right':'left');
    else changeDir(y>0?'down':'up');
}
function changeDir(dir) {
    if(!game || game.gameOver || paused) return;
    const map={up:{x:0,y:-1},down:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};
    const nd=map[dir];
    if(nd && (nd.x!==-game.dir.x || nd.y!==-game.dir.y)) game.nextDir=nd;
}
let touchStartX, touchStartY;
document.addEventListener('touchstart',(e)=>{
    if(state.control!=='swipe' || !document.getElementById('gameScreen').classList.contains('active')) return;
    const t=e.touches[0]; touchStartX=t.clientX; touchStartY=t.clientY;
});
document.addEventListener('touchend',(e)=>{
    if(state.control!=='swipe' || !document.getElementById('gameScreen').classList.contains('active')) return;
    const t=e.changedTouches[0];
    const dx=t.clientX-touchStartX, dy=t.clientY-touchStartY;
    if(Math.abs(dx)>Math.abs(dy)) changeDir(dx>0?'right':'left');
    else changeDir(dy>0?'down':'up');
});
document.addEventListener('keydown',(e)=>{
    if(e.code==='Space' && document.getElementById('gameScreen').classList.contains('active')){ e.preventDefault(); togglePause(); return; }
    if(!document.getElementById('gameScreen').classList.contains('active')) return;
    const binds=state.customBinds;
    const key=e.code;
    if(key===binds.up || key==='ArrowUp'){ e.preventDefault(); changeDir('up'); }
    else if(key===binds.down || key==='ArrowDown'){ e.preventDefault(); changeDir('down'); }
    else if(key===binds.left || key==='ArrowLeft'){ e.preventDefault(); changeDir('left'); }
    else if(key===binds.right || key==='ArrowRight'){ e.preventDefault(); changeDir('right'); }
});

// ================= INIT =================
loadState();
updateStyleCache();
document.addEventListener('click', initAudio, {once:true});
document.addEventListener('touchstart', initAudio, {once:true});
</script>
</body>
